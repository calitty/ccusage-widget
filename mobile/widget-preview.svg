<svg width="360" height="170" viewBox="0 0 360 170" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101526"/>
      <stop offset="1" stop-color="#0a0c14"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7b1a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff7b1a" stop-opacity="0.14"/>
    </linearGradient>
    <radialGradient id="blobO"><stop offset="0" stop-color="#ff7b1a" stop-opacity="0.35"/><stop offset="1" stop-color="#ff7b1a" stop-opacity="0"/></radialGradient>
    <clipPath id="card"><rect x="2" y="2" width="356" height="166" rx="24"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect x="2" y="2" width="356" height="166" rx="24" fill="url(#bg)"/>
    <circle cx="330" cy="20" r="90" fill="url(#blobO)"/>
  </g>

  <!-- header -->
  <text x="18" y="30" fill="#ff7b1a" font-size="12" font-weight="700">◆ Claude</text>
  <text x="342" y="30" fill="#fff" fill-opacity="0.4" font-size="9" text-anchor="end" font-family="monospace">3分前</text>

  <!-- metrics -->
  <g font-family="monospace">
    <text x="18" y="52" fill="#fff" fill-opacity="0.55" font-size="10.5">今日</text>
    <text x="272" y="53" fill="#fff" font-size="14" font-weight="700" text-anchor="end">100.2M</text>
    <text x="342" y="52" fill="#ff7b1a" font-size="12" font-weight="700" text-anchor="end">$106.77</text>

    <text x="18" y="72" fill="#fff" fill-opacity="0.55" font-size="10.5">近7天</text>
    <text x="272" y="73" fill="#fff" font-size="14" font-weight="700" text-anchor="end">279.0M</text>
    <text x="342" y="72" fill="#ff7b1a" font-size="12" font-weight="700" text-anchor="end">$430.15</text>

    <text x="18" y="92" fill="#fff" fill-opacity="0.55" font-size="10.5">累计</text>
    <text x="272" y="93" fill="#fff" font-size="14" font-weight="700" text-anchor="end">3.96B</text>
    <text x="342" y="92" fill="#ff7b1a" font-size="12" font-weight="700" text-anchor="end">$3317</text>
  </g>

  <!-- 7-day bars -->
  <g>
    <rect x="18"  y="112" width="41" height="12" rx="3" fill="url(#bar)"/>
    <rect x="65"  y="120" width="41" height="4"  rx="2" fill="url(#bar)"/>
    <rect x="112" y="106" width="41" height="18" rx="3" fill="url(#bar)"/>
    <rect x="159" y="108" width="41" height="16" rx="3" fill="url(#bar)"/>
    <rect x="206" y="116" width="41" height="8"  rx="3" fill="url(#bar)"/>
    <rect x="253" y="110" width="41" height="14" rx="3" fill="url(#bar)"/>
    <rect x="300" y="102" width="41" height="22" rx="3" fill="#ff7b1a"/>
  </g>

  <line x1="18" y1="136" x2="342" y2="136" stroke="#fff" stroke-opacity="0.1"/>

  <!-- session -->
  <circle cx="22" cy="153" r="4" fill="#8dff7a"/>
  <circle cx="22" cy="153" r="6.5" fill="#39ff14" fill-opacity="0.28"/>
  <text x="33" y="157" fill="#fff" fill-opacity="0.55" font-size="10">5小时会话 · 剩 3h45m</text>
  <text x="342" y="158" fill="#f0b86e" font-size="12" font-weight="700" text-anchor="end" font-family="monospace">$71.45</text>
</svg>
