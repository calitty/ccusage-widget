  <text x="268" y="34" fill="#fff" fill-opacity="0.4" font-size="9" text-anchor="end" font-family="monospace">2026-07-09</text>

  <!-- tabs -->
  <rect x="32" y="46" width="236" height="30" rx="10" fill="#ffffff" fill-opacity="0.06"/>
  <rect x="35" y="49" width="114" height="24" rx="8" fill="#ff7b1a"/>
  <text x="92" y="65" fill="#08111a" font-size="12" font-weight="700" text-anchor="middle">Claude</text>
  <text x="207" y="65" fill="#fff" fill-opacity="0.65" font-size="12" text-anchor="middle">Codex</text>

  <!-- metrics -->
  <g font-family="monospace">
    <text x="32" y="103" fill="#fff" fill-opacity="0.55" font-size="11">今日</text>
    <text x="196" y="104" fill="#fff" font-size="16" font-weight="700" text-anchor="end">62.0M</text>
    <text x="268" y="103" fill="#ff7b1a" font-size="12.5" font-weight="700" text-anchor="end">$52.14</text>

    <text x="32" y="125" fill="#fff" fill-opacity="0.55" font-size="11">近7天</text>
    <text x="196" y="126" fill="#fff" font-size="16" font-weight="700" text-anchor="end">240.9M</text>
    <text x="268" y="125" fill="#ff7b1a" font-size="12.5" font-weight="700" text-anchor="end">$381.6</text>

    <text x="32" y="147" fill="#fff" fill-opacity="0.55" font-size="11">累计</text>
    <text x="196" y="148" fill="#fff" font-size="16" font-weight="700" text-anchor="end">3.96B</text>
    <text x="268" y="147" fill="#ff7b1a" font-size="12.5" font-weight="700" text-anchor="end">$3317</text>
  </g>

  <!-- trend -->
  <text x="32" y="172" fill="#fff" fill-opacity="0.4" font-size="9" letter-spacing="2">近7天趋势</text>
  <g>
    <rect x="32"  y="196" width="29" height="18" rx="3" fill="url(#bar)"/>
    <rect x="66"  y="210" width="29" height="4"  rx="2" fill="url(#bar)"/>
    <rect x="100" y="180" width="29" height="34" rx="3" fill="url(#bar)"/>
    <rect x="134" y="182" width="29" height="32" rx="3" fill="url(#bar)"/>
    <rect x="168" y="202" width="29" height="12" rx="3" fill="url(#bar)"/>
    <rect x="202" y="192" width="29" height="22" rx="3" fill="url(#bar)"/>
    <rect x="236" y="178" width="29" height="36" rx="3" fill="#ff7b1a"/>
  </g>
  <g fill="#fff" fill-opacity="0.32" font-size="8" font-family="monospace" text-anchor="middle">
    <text x="46" y="226">03</text><text x="80" y="226">04</text><text x="114" y="226">05</text>
    <text x="148" y="226">06</text><text x="182" y="226">07</text><text x="216" y="226">08</text><text x="250" y="226">09</text>
  </g>

  <line x1="32" y1="238" x2="268" y2="238" stroke="#fff" stroke-opacity="0.1"/>

  <!-- session -->
  <circle cx="36" cy="258" r="3.5" fill="#34e6c8"/>
  <text x="46" y="262" fill="#fff" fill-opacity="0.5" font-size="10" letter-spacing="1">5小时会话 · 剩 4h12m</text>
  <text x="268" y="263" fill="#f0b86e" font-size="13" font-weight="700" text-anchor="end" font-family="monospace">$34.54</text>
</svg>
