<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101526"/>
      <stop offset="1" stop-color="#0a0c14"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="blobO"><stop offset="0" stop-color="#ff7b1a" stop-opacity="0.5"/><stop offset="1" stop-color="#ff7b1a" stop-opacity="0"/></radialGradient>
    <radialGradient id="blobV"><stop offset="0" stop-color="#a78bfa" stop-opacity="0.5"/><stop offset="1" stop-color="#a78bfa" stop-opacity="0"/></radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7b1a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff7b1a" stop-opacity="0.14"/>
    </linearGradient>
    <clipPath id="card"><rect x="14" y="8" width="272" height="284" rx="20"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect x="14" y="8" width="272" height="284" rx="20" fill="url(#bg)"/>
    <circle cx="270" cy="30" r="80" fill="url(#blobO)"/>
    <circle cx="30" cy="270" r="80" fill="url(#blobV)"/>
    <rect x="14" y="8" width="272" height="130" fill="url(#gloss)"/>
  </g>
  <rect x="14.5" y="8.5" width="271" height="283" rx="19.5" fill="none" stroke="#ff7b1a" stroke-opacity="0.4"/>

  <!-- header -->
